<svg viewBox="0 0 800 660" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/>
    </marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#eb6c36"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f5f5f5"/>

  <!-- Vertical separator between cadence label column and command column -->
  <line x1="180" y1="32" x2="180" y2="600" stroke="rgba(45,49,66,0.15)" stroke-width="0.8"/>

  <!-- ROW 1: CONTINUOUS -->
  <text x="40" y="72" fill="#7a8399" font-size="9" font-family="'Geist Mono', monospace" letter-spacing="0.14em">CONTINUOUS</text>
  <text x="40" y="92" fill="#4f5d75" font-size="10" font-family="'Geist', sans-serif" font-style="italic">throughout your day</text>

  <rect x="200" y="56" width="560" height="48" rx="6" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)"/>
  <text x="220" y="80" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif">drop files into entry points</text>
  <text x="220" y="96" fill="#4f5d75" font-size="10" font-family="'Geist Mono', monospace">no command needed; files sit until /ingest runs</text>

  <!-- ROW 2: DAILY -->
  <text x="40" y="172" fill="#7a8399" font-size="9" font-family="'Geist Mono', monospace" letter-spacing="0.14em">EVERY FEW DAYS</text>
  <text x="40" y="192" fill="#4f5d75" font-size="10" font-family="'Geist', sans-serif" font-style="italic">check, then compile</text>

  <rect x="200" y="156" width="140" height="48" rx="6" fill="#ffffff" stroke="#2d3142"/>
  <text x="270" y="180" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">/status</text>
  <text x="270" y="196" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">what changed?</text>

  <rect x="356" y="172" width="14" height="14" rx="2" fill="#f5f5f5"/>
  <path d="M 340 180 L 396 180" stroke="#eb6c36" stroke-width="1" fill="none" marker-end="url(#arrow-accent)"/>

  <rect x="400" y="156" width="160" height="48" rx="6" fill="rgba(235,108,54,0.08)" stroke="#eb6c36"/>
  <text x="480" y="180" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">/ingest</text>
  <text x="480" y="196" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">distill new sources</text>

  <text x="580" y="184" fill="#4f5d75" font-size="10" font-family="'Geist', sans-serif" font-style="italic">pages written, manifest updated</text>

  <!-- ROW 3: WEEKLY -->
  <text x="40" y="272" fill="#7a8399" font-size="9" font-family="'Geist Mono', monospace" letter-spacing="0.14em">WEEKLY</text>
  <text x="40" y="292" fill="#4f5d75" font-size="10" font-family="'Geist', sans-serif" font-style="italic">maintenance</text>

  <rect x="200" y="256" width="140" height="48" rx="6" fill="#ffffff" stroke="#2d3142"/>
  <text x="270" y="280" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">/lint</text>
  <text x="270" y="296" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">find issues</text>

  <path d="M 340 280 L 396 280" stroke="#4f5d75" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

  <rect x="400" y="256" width="160" height="48" rx="6" fill="#ffffff" stroke="#2d3142"/>
  <text x="480" y="280" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">/cross-linker</text>
  <text x="480" y="296" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">repair wikilinks</text>

  <text x="580" y="284" fill="#4f5d75" font-size="10" font-family="'Geist', sans-serif" font-style="italic">orphans, broken links, stale pages</text>

  <!-- ROW 4: MONTHLY / RARE -->
  <text x="40" y="372" fill="#7a8399" font-size="9" font-family="'Geist Mono', monospace" letter-spacing="0.14em">MONTHLY OR RARE</text>
  <text x="40" y="392" fill="#4f5d75" font-size="10" font-family="'Geist', sans-serif" font-style="italic">snapshots and resets</text>

  <rect x="200" y="356" width="140" height="48" rx="6" fill="#ffffff" stroke="#2d3142"/>
  <text x="270" y="380" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">/archive</text>
  <text x="270" y="396" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">snapshot</text>

  <rect x="400" y="356" width="160" height="48" rx="6" fill="#ffffff" stroke="#2d3142" stroke-dasharray="4,3"/>
  <text x="480" y="380" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">/rebuild</text>
  <text x="480" y="396" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">reprocess all sources</text>

  <text x="580" y="384" fill="#4f5d75" font-size="10" font-family="'Geist', sans-serif" font-style="italic">rebuild only after schema changes</text>

  <!-- ROW 5: AD-HOC -->
  <text x="40" y="468" fill="#7a8399" font-size="9" font-family="'Geist Mono', monospace" letter-spacing="0.14em">AD-HOC, ANY TIME</text>
  <text x="40" y="488" fill="#4f5d75" font-size="10" font-family="'Geist', sans-serif" font-style="italic">use, refine, teach</text>

  <!-- 8 small boxes in two rows of 4 -->
  <rect x="200" y="448" width="124" height="40" rx="6" fill="#ffffff" stroke="#2d3142"/>
  <text x="262" y="465" fill="#2d3142" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">/query</text>
  <text x="262" y="479" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">ask the wiki</text>

  <rect x="340" y="448" width="124" height="40" rx="6" fill="#ffffff" stroke="#2d3142"/>
  <text x="402" y="465" fill="#2d3142" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">/update</text>
  <text x="402" y="479" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">refine a page</text>

  <rect x="480" y="448" width="124" height="40" rx="6" fill="#ffffff" stroke="#2d3142"/>
  <text x="542" y="465" fill="#2d3142" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">/research</text>
  <text x="542" y="479" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">web + distill</text>

  <rect x="620" y="448" width="124" height="40" rx="6" fill="#ffffff" stroke="#2d3142"/>
  <text x="682" y="465" fill="#2d3142" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">/capture</text>
  <text x="682" y="479" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">save this chat</text>

  <rect x="200" y="500" width="124" height="40" rx="6" fill="#ffffff" stroke="#2d3142"/>
  <text x="262" y="517" fill="#2d3142" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">/ingest-url</text>
  <text x="262" y="531" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">one URL</text>

  <rect x="340" y="500" width="124" height="40" rx="6" fill="#ffffff" stroke="#2d3142"/>
  <text x="402" y="517" fill="#2d3142" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">/ingest-claude</text>
  <text x="402" y="531" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">conversation exports</text>

  <rect x="480" y="500" width="124" height="40" rx="6" fill="#ffffff" stroke="#2d3142"/>
  <text x="542" y="517" fill="#2d3142" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">/project</text>
  <text x="542" y="531" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">create/archive</text>

  <rect x="620" y="500" width="124" height="40" rx="6" fill="rgba(235,108,54,0.08)" stroke="#eb6c36"/>
  <text x="682" y="517" fill="#2d3142" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">/feedback</text>
  <text x="682" y="531" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">teach the agent</text>

  <!-- Legend -->
  <line x1="40" y1="612" x2="760" y2="612" stroke="rgba(45,49,66,0.10)" stroke-width="0.8"/>
  <text x="40" y="636" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.14em">LEGEND</text>
  <rect x="120" y="626" width="14" height="14" rx="2" fill="rgba(235,108,54,0.08)" stroke="#eb6c36"/>
  <text x="142" y="637" fill="#4f5d75" font-size="10" font-family="'Geist Mono', monospace">primary loop</text>
  <rect x="260" y="626" width="14" height="14" rx="2" fill="#ffffff" stroke="#2d3142"/>
  <text x="282" y="637" fill="#4f5d75" font-size="10" font-family="'Geist Mono', monospace">supporting</text>
  <rect x="380" y="626" width="14" height="14" rx="2" fill="#ffffff" stroke="#2d3142" stroke-dasharray="4,3"/>
  <text x="402" y="637" fill="#4f5d75" font-size="10" font-family="'Geist Mono', monospace">rare</text>
</svg>
